<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Uttarakhand Himalayan Reform Archive - Detail</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=IBM+Plex+Mono:wght@300;400;500&family=Source+Serif+4:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#FFF8F0;
  --surface:#C08552;
  --card:#8C5A3C;
  --card-hover:#4B2E2B;
  --line:#C08552;
  --line-soft:#8C5A3C;
  --text:#4B2E2B;
  --text-soft:#8C5A3C;
  --muted:#C08552;
  --muted-2:#4B2E2B;
  --accent:#FFF8F0;
  --chip:#C08552;
  --white:#FFF8F0;
}
*{box-sizing:border-box;margin:0;padding:0}
body {
  background:var(--bg);
  color:var(--text-soft);
  font-family:'Source Serif 4',Georgia,serif;
  min-height:100vh;
  line-height:1.7;
}
body::before {
  content:"";
  position:fixed; inset:0;
  background-image:
    radial-gradient(circle at 25% 25%, rgba(255,255,255,.03) 2px, transparent 2px),
    radial-gradient(circle at 75% 75%, rgba(255,255,255,.03) 2px, transparent 2px),
    linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
}
.page {max-width:800px;margin:0 auto;padding:0 24px;position:relative;z-index:1}
.header {padding:58px 0 30px;border-bottom:1px solid var(--line)}
.eyebrow {display:flex;align-items:center;gap:14px;margin-bottom:18px}
.eyebrow-line {flex:1;height:1px;background:linear-gradient(to right,#5a5a5a,transparent)}
.eyebrow-text {
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;
  letter-spacing:.22em;
  color:var(--muted);
  text-transform:uppercase;
}
h1 {
  font-family:'Playfair Display',serif;
  color:#4B2E2B;
  font-size:clamp(34px,5vw,66px);
  line-height:1.04;
  font-weight:400;
  max-width:950px;
}
h1 em {font-style:italic;color:#cfcfcf}
.subtitle {
  margin-top:14px;
  max-width:780px;
  color:var(--muted);
  font-style:italic;
  font-size:16px;
}
.detail {margin:20px 0}
.detail h2 {
  font-family:'Playfair Display',serif;
  color:var(--surface);
  font-size:24px;
  margin-bottom:10px;
  margin-top:30px;
}
.detail p {margin-bottom:10px}
.sources {margin:20px 0}
.sources h2 {
  font-family:'Playfair Display',serif;
  color:var(--surface);
  font-size:24px;
  margin-bottom:10px;
}
.sources a {
  color:var(--surface);
  text-decoration:none;
  border-bottom:1px solid transparent;
  display:block;
  margin-bottom:8px;
  word-break:break-all;
}
.sources a:hover {border-color:var(--surface)}
.back {margin-top:40px;margin-bottom:40px}
.back a {
  color:var(--surface);
  text-decoration:none;
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:.1em;
}
.back a:hover {text-decoration:underline}
.lang-toggle {display:flex;gap:10px;margin:20px 0}
.lang-btn {
  background:transparent;
  border:1px solid var(--line-soft);
  color:var(--muted);
  padding:6px 12px;
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;
  letter-spacing:.1em;
  text-transform:uppercase;
  cursor:pointer;
  transition:.2s ease;
}
.lang-btn:hover,.lang-btn.on {
  background:var(--white);
  border-color:var(--white);
  color:#0d0d0d;
}
.content {margin:20px 0}
.content.hidden {display:none}
.field-label {font-weight:600;color:var(--surface)}
.field-value {color:var(--text-soft);margin-bottom:8px}
</style>
</head>
<body>
<div class="page">
  <header class="header">
    <div class="eyebrow">
      <div class="eyebrow-line"></div>
      <div class="eyebrow-text">Uttarakhand Himalayan Reform Archive</div>
      <div class="eyebrow-line"></div>
    </div>
    <h1 id="page-title">Loading...</h1>
    <div class="subtitle" id="page-headline"></div>
  </header>

  <div class="lang-toggle">
    <button class="lang-btn on" id="lang-en">English</button>
    <button class="lang-btn" id="lang-hi">हिंदी</button>
  </div>

  <div class="detail">
    <h2>Details</h2>
    <div class="field-value"><span class="field-label">Type:</span> <span id="field-type"></span></div>
    <div class="field-value"><span class="field-label">Domain:</span> <span id="field-domain"></span></div>
    <div class="field-value"><span class="field-label">Region:</span> <span id="field-region"></span></div>
    <div class="field-value"><span class="field-label">District/Area:</span> <span id="field-district"></span></div>
    <div class="field-value"><span class="field-label">Years:</span> <span id="field-years"></span></div>
  </div>

  <div class="detail">
    <h2>Summary</h2>
    <div id="content-en-summary" class="content"></div>
    <div id="content-hi-summary" class="content hidden"></div>
  </div>

  <div class="detail">
    <h2>Generated Paragraphs</h2>
    <div id="content-en" class="content"></div>
    <div id="content-hi" class="content hidden"></div>
  </div>

  <div class="sources" id="sources-section" style="display:none">
    <h2>Sources</h2>
    <div id="sources-list"></div>
  </div>

  <div class="back">
    <a href="index.html">← Back to Archive</a>
  </div>
</div>

<script>
let language = 'en';

async function loadData() {
  try {
    // Get type and id from URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    const type = urlParams.get('type') || 'personality';
    const id = urlParams.get('id') || 'P-001';

    // Fetch the JSON data
    const response = await fetch('https://raw.githubusercontent.com/SADIA-png/8805/main/uttarakhand_onepagers_full_data.json');
    const data = await response.json();

    // Determine which array to search
    const records = type === 'event' ? data.events : data.personalities;
    
    // Find the matching record
    const record = records.find(r => r.id === id);

    if (!record) {
      document.getElementById('page-title').textContent = 'Record Not Found';
      return;
    }

    // Populate the page
    document.getElementById('page-title').textContent = record.name;
    document.getElementById('page-headline').textContent = record.headline || '';
    
    document.getElementById('field-type').textContent = record.type || 'N/A';
    document.getElementById('field-domain').textContent = record.domain || 'N/A';
    document.getElementById('field-region').textContent = record.region || 'N/A';
    document.getElementById('field-district').textContent = record.district_or_area || 'N/A';
    document.getElementById('field-years').textContent = record.years || 'N/A';

    // Summary
    document.getElementById('content-en-summary').textContent = record.summary || '';
    document.getElementById('content-hi-summary').textContent = record.summary_hi || '';

    // Generated paragraphs
    document.getElementById('content-en').textContent = record.generated_paragraphs || '';
    document.getElementById('content-hi').textContent = record.generated_paragraphs_hi || '';

    // Sources
    if (record.sources && record.sources.length > 0) {
      document.getElementById('sources-section').style.display = 'block';
      const sourcesList = document.getElementById('sources-list');
      sourcesList.innerHTML = record.sources.map(url => 
        `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`
      ).join('');
    }
  } catch (error) {
    console.error('Error loading data:', error);
    document.getElementById('page-title').textContent = 'Error Loading Data';
  }
}

document.getElementById('lang-en').addEventListener('click', () => {
  language = 'en';
  document.getElementById('lang-en').classList.add('on');
  document.getElementById('lang-hi').classList.remove('on');
  document.getElementById('content-en').classList.remove('hidden');
  document.getElementById('content-hi').classList.add('hidden');
  document.getElementById('content-en-summary').classList.remove('hidden');
  document.getElementById('content-hi-summary').classList.add('hidden');
});

document.getElementById('lang-hi').addEventListener('click', () => {
  language = 'hi';
  document.getElementById('lang-hi').classList.add('on');
  document.getElementById('lang-en').classList.remove('on');
  document.getElementById('content-hi').classList.remove('hidden');
  document.getElementById('content-en').classList.add('hidden');
  document.getElementById('content-hi-summary').classList.remove('hidden');
  document.getElementById('content-en-summary').classList.add('hidden');
});

// Load data when page loads
window.addEventListener('load', loadData);
</script>
</body>
</html>
