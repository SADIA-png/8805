<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Uttarakhand Himalayan Reform Archive - Detail</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=IBM+Plex+Mono:wght@300;400;500&family=Source+Serif+4:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#FFF8F0;
  --primary:#6E3B3B;
  --secondary:#AC3F21;
  --accent:#BE6A15;
  --highlight:#F3CF7A;
  --text-dark:#6E3B3B;
  --text-light:#AC3F21;
  --border:#BE6A15;
}
*{box-sizing:border-box;margin:0;padding:0}
body {
  background:var(--bg);
  color:var(--text-dark);
  font-family:'Source Serif 4',Georgia,serif;
  min-height:100vh;
  line-height:1.7;
}
body::before {
  content:"";
  position:fixed; inset:0;
  background-image:
    radial-gradient(circle at 25% 25%, rgba(110,59,59,.02) 2px, transparent 2px),
    radial-gradient(circle at 75% 75%, rgba(110,59,59,.02) 2px, transparent 2px),
    linear-gradient(90deg, rgba(110,59,59,.02) 1px, transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
}
.page {max-width:800px;margin:0 auto;padding:0 24px;position:relative;z-index:1}
.header {padding:58px 0 30px;border-bottom:2px solid var(--border)}
.eyebrow {display:flex;align-items:center;gap:14px;margin-bottom:18px}
.eyebrow-line {flex:1;height:1px;background:linear-gradient(to right,var(--secondary),transparent)}
.eyebrow-text {
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;
  letter-spacing:.22em;
  color:var(--text-dark);
  text-transform:uppercase;
  font-weight:600;
}
h1 {
  font-family:'Playfair Display',serif;
  color:var(--primary);
  font-size:clamp(34px,5vw,66px);
  line-height:1.04;
  font-weight:400;
  max-width:950px;
}
h1 em {font-style:italic;color:var(--accent)}
.subtitle {
  margin-top:14px;
  max-width:780px;
  color:var(--text-light);
  font-style:italic;
  font-size:16px;
}
.detail {margin:20px 0}
.detail h2 {
  font-family:'Playfair Display',serif;
  color:var(--primary);
  font-size:24px;
  margin-bottom:15px;
  margin-top:30px;
  font-weight:600;
  border-bottom:2px solid var(--border);
  padding-bottom:10px;
}
.detail p {margin-bottom:12px;color:var(--text-dark)}
.field-value {color:var(--text-dark)}
.field-label {font-weight:600;color:var(--secondary)}
.content-text {
  color:var(--text-dark);
  line-height:1.8;
  margin:15px 0;
}
.sources {margin:20px 0}
.sources h2 {
  font-family:'Playfair Display',serif;
  color:var(--primary);
  font-size:24px;
  margin-bottom:15px;
  font-weight:600;
  border-bottom:2px solid var(--border);
  padding-bottom:10px;
}
.sources a {
  color:var(--secondary);
  text-decoration:none;
  border-bottom:2px solid transparent;
  display:block;
  margin-bottom:12px;
  word-break:break-all;
  font-size:13px;
  line-height:1.6;
}
.sources a:hover {border-color:var(--secondary);color:var(--primary)}
.back {margin-top:40px;margin-bottom:40px}
.back a {
  color:var(--secondary);
  text-decoration:none;
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:.1em;
  font-weight:600;
  border:2px solid var(--border);
  padding:8px 14px;
  display:inline-block;
}
.back a:hover {background:var(--highlight);color:var(--primary)}
.lang-toggle {display:flex;gap:10px;margin:20px 0}
.lang-label {
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;
  color:var(--text-dark);
  text-transform:uppercase;
  font-weight:600;
}
.lang-btn {
  background:transparent;
  border:2px solid var(--border);
  color:var(--text-dark);
  padding:8px 14px;
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;
  letter-spacing:.1em;
  text-transform:uppercase;
  cursor:pointer;
  transition:.2s ease;
  font-weight:600;
}
.lang-btn:hover {
  background:var(--highlight);
  border-color:var(--accent);
}
.lang-btn.on {
  background:var(--secondary);
  color:#FFF8F0;
  border-color:var(--secondary);
}
.content.hidden {display:none}
</style>
</head>
<body>
<div class="page">
  <header class="header">
    <div class="eyebrow">
      <div class="eyebrow-line"></div>
      <div class="eyebrow-text">Uttarakhand Himalayan Reform Archive</div>
      <div class="eyebrow-line"></div>
    </div>
    <h1 id="page-title">Loading...</h1>
    <div class="subtitle" id="page-headline"></div>
  </header>

  <div class="lang-toggle">
    <span class="lang-label">Language:</span>
    <button class="lang-btn on" id="lang-en">English</button>
    <button class="lang-btn" id="lang-hi">हिंदी</button>
  </div>

  <div class="detail">
    <h2>Details</h2>
    <div class="field-value"><span class="field-label">Type:</span> <span id="field-type"></span></div>
    <div class="field-value"><span class="field-label">Domain:</span> <span id="field-domain"></span></div>
    <div class="field-value"><span class="field-label">Region:</span> <span id="field-region"></span></div>
    <div class="field-value"><span class="field-label">District/Area:</span> <span id="field-district"></span></div>
    <div class="field-value"><span class="field-label">Years:</span> <span id="field-years"></span></div>
  </div>

  <div class="detail">
    <h2 id="summary-title">Summary</h2>
    <div id="content-en-summary" class="content content-text"></div>
    <div id="content-hi-summary" class="content content-text hidden"></div>
  </div>

  <div class="detail">
    <h2 id="para-title">Detailed Information</h2>
    <div id="content-en" class="content content-text"></div>
    <div id="content-hi" class="content content-text hidden"></div>
  </div>

  <div class="sources" id="sources-section" style="display:none">
    <h2>Sources</h2>
    <div id="sources-list"></div>
  </div>

  <div class="back">
    <a href="index.html">← Back to Archive</a>
  </div>
</div>

<script>
let currentLanguage = 'en';

async function loadData() {
  try {
    // Get parameters from URL
    const urlParams = new URLSearchParams(window.location.search);
    const type = urlParams.get('type') || 'personality';
    const id = urlParams.get('id') || 'P-001';
    currentLanguage = urlParams.get('lang') || 'en';

    // Set language button state
    if(currentLanguage === 'hi') {
      document.getElementById('lang-en').classList.remove('on');
      document.getElementById('lang-hi').classList.add('on');
    }

    // Fetch the JSON data
    const response = await fetch('https://raw.githubusercontent.com/SADIA-png/8805/main/uttarakhand_onepagers_full_data.json');
    const data = await response.json();

    // Determine which array to search
    const records = type === 'event' ? data.events : data.personalities;
    
    // Find the matching record
    const record = records.find(r => r.id === id);

    if (!record) {
      document.getElementById('page-title').textContent = 'Record Not Found';
      return;
    }

    // Get language-specific data
    const isHindi = currentLanguage === 'hi';
    const name = isHindi ? record.name_hi : record.name;
    const headline = isHindi ? record.headline_hi : record.headline;
    const summary = isHindi ? record.summary_hi : record.summary;
    const type_display = isHindi ? record.type_hi : record.type;
    const domain_display = isHindi ? record.domain_hi : record.domain;
    const region_display = isHindi ? record.region_hi : record.region;
    const district_display = isHindi ? record.district_or_area_hi : record.district_or_area;
    const paragraphs = isHindi ? record.generated_paragraphs_hi : record.generated_paragraphs;

    // Populate the page with ONLY selected language content
    document.getElementById('page-title').textContent = name || 'N/A';
    document.getElementById('page-headline').textContent = headline || '';
    
    document.getElementById('field-type').textContent = type_display || 'N/A';
    document.getElementById('field-domain').textContent = domain_display || 'N/A';
    document.getElementById('field-region').textContent = region_display || 'N/A';
    document.getElementById('field-district').textContent = district_display || 'N/A';
    document.getElementById('field-years').textContent = record.years || 'N/A';

    // Summary - show ONLY selected language
    if(isHindi) {
      document.getElementById('content-en-summary').classList.add('hidden');
      document.getElementById('content-hi-summary').classList.remove('hidden');
      document.getElementById('content-hi-summary').textContent = summary || '';
    } else {
      document.getElementById('content-en-summary').classList.remove('hidden');
      document.getElementById('content-hi-summary').classList.add('hidden');
      document.getElementById('content-en-summary').textContent = summary || '';
    }

    // Paragraphs - show ONLY selected language
    if(isHindi) {
      document.getElementById('content-en').classList.add('hidden');
      document.getElementById('content-hi').classList.remove('hidden');
      document.getElementById('content-hi').textContent = paragraphs || '';
    } else {
      document.getElementById('content-en').classList.remove('hidden');
      document.getElementById('content-hi').classList.add('hidden');
      document.getElementById('content-en').textContent = paragraphs || '';
    }

    // Sources
    if (record.sources && record.sources.length > 0) {
      document.getElementById('sources-section').style.display = 'block';
      const sourcesList = document.getElementById('sources-list');
      sourcesList.innerHTML = record.sources.map(url => 
        `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`
      ).join('');
    }
  } catch (error) {
    console.error('Error loading data:', error);
    document.getElementById('page-title').textContent = 'Error Loading Data';
  }
}

document.getElementById('lang-en').addEventListener('click', () => {
  currentLanguage = 'en';
  document.getElementById('lang-en').classList.add('on');
  document.getElementById('lang-hi').classList.remove('on');
  document.getElementById('content-en-summary').classList.remove('hidden');
  document.getElementById('content-hi-summary').classList.add('hidden');
  document.getElementById('content-en').classList.remove('hidden');
  document.getElementById('content-hi').classList.add('hidden');
  
  // Update URL
  const urlParams = new URLSearchParams(window.location.search);
  urlParams.set('lang', 'en');
  window.history.replaceState({}, '', '?' + urlParams);
});

document.getElementById('lang-hi').addEventListener('click', () => {
  currentLanguage = 'hi';
  document.getElementById('lang-hi').classList.add('on');
  document.getElementById('lang-en').classList.remove('on');
  document.getElementById('content-hi-summary').classList.remove('hidden');
  document.getElementById('content-en-summary').classList.add('hidden');
  document.getElementById('content-hi').classList.remove('hidden');
  document.getElementById('content-en').classList.add('hidden');
  
  // Update URL
  const urlParams = new URLSearchParams(window.location.search);
  urlParams.set('lang', 'hi');
  window.history.replaceState({}, '', '?' + urlParams);
});

window.addEventListener('load', loadData);
</script>
</body>
</html>
